<!-- =========================
   🧠 MAIN BJVE APP
========================= -->
<div id="bjve-main"></div>

<!-- =========================
   ⚙️ BJVE ENGINE LOAD
========================= -->
<script>
console.log("[BJVE] Boot starting...");

function startBJVE() {

  fetch("./scripts/index.bjve")
    .then(res => {
      if (!res.ok) throw new Error("index.bjve not found");
      return res.text();
    })
    .then(code => {
      console.log("[BJVE] Running .bjve script");
      BJVE.script.run(code);

      document.getElementById("bjve-main").style.display = "block";
    })
    .catch(err => {
      console.error("[BJVE] BOOT FAILED:", err);

      document.getElementById("bjve-error").style.display = "block";
    });
}

/* wait for BJVE */
window.addEventListener("load", () => {
  if (typeof BJVE === "undefined") {
    document.getElementById("bjve-error").style.display = "block";
  } else {
    startBJVE();
  }
});
</script>
