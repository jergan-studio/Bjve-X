<!DOCTYPE html>

<!-- =========================
   🪟 OPEN DRAW FIX (CRITICAL)
   MUST LOAD BEFORE BJVE UI
========================= -->
<script>
function OpenDraw(html, options = {}) {
  const win = document.createElement("div");

  win.style.position = "fixed";
  win.style.top = "50%";
  win.style.left = "50%";
  win.style.transform = "translate(-50%, -50%)";
  win.style.width = (options.width || 300) + "px";
  win.style.height = (options.height || 200) + "px";
  win.style.background = "#111";
  win.style.color = "#0f0";
  win.style.padding = "10px";
  win.style.border = "1px solid #0f0";
  win.style.zIndex = 9999;
  win.style.overflow = "auto";

  win.innerHTML = `
    <div style="font-size:12px; margin-bottom:5px;">
      ${options.title || "BJVE Window"}
    </div>
    ${html}
  `;

  document.body.appendChild(win);

  return win;
}
</script>

<!-- =========================
   ⚙️ BJVE CORE SYSTEM

<!-- =========================
   🚀 BOOT .BJVE ENTRY FILE
========================= -->
<script>
console.log("[BJVE] Boot starting...");

fetch("./scripts/index.bjve")
  .then(res => {
    if (!res.ok) throw new Error("index.bjve not found");
    return res.text();
  })
  .then(code => {
    console.log("[BJVE] Running index.bjve");
    BJVE.script.run(code);
  })
  .catch(err => {
    console.error("[BJVE] Boot failed:", err);
  });
</script>
